<!DOCTYPE html>
<html>
<head>
    <title>Push Notification Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            background: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover {
            background: #45a049;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <h1>🔔 Push Notification Test</h1>
    
    <h3>1. Firestore'dan FCM Token Al</h3>
    <p>Kullanıcı ID'sini girin:</p>
    <input type="text" id="userId" placeholder="Kullanıcı UID'si">
    <button onclick="getToken()">Token Al</button>
    <div id="tokenResult" class="result" style="display:none;"></div>

    <h3>2. Test Bildirimi Gönder</h3>
    <input type="text" id="title" placeholder="Bildirim Başlığı" value="Test Bildirimi">
    <textarea id="body" placeholder="Bildirim Mesajı" rows="3">Bu bir test bildirimidir</textarea>
    <input type="text" id="token" placeholder="FCM Token (yukarıdan kopyalayın)">
    <button onclick="sendNotification()">Bildirim Gönder</button>
    <div id="sendResult" class="result" style="display:none;"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAhMj0ljztXyusfVKLu8R8I7Kp_u8mMdlM",
            authDomain: "ecocell-5cf22.firebaseapp.com",
            projectId: "ecocell-5cf22",
            storageBucket: "ecocell-5cf22.firebasestorage.app",
            messagingSenderId: "357513489226",
            appId: "1:357513489226:web:d915b52699b588b4436fb3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.getToken = async function() {
            const userId = document.getElementById('userId').value;
            if (!userId) {
                alert('Kullanıcı ID giriniz');
                return;
            }

            try {
                const userDoc = await getDoc(doc(db, 'users', userId));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    const token = userData.fcmToken;
                    
                    document.getElementById('tokenResult').style.display = 'block';
                    document.getElementById('tokenResult').innerHTML = `
                        <strong>FCM Token:</strong><br>
                        <textarea readonly style="width:100%; height:100px;">${token || 'Token bulunamadı'}</textarea><br>
                        <strong>Bildirimler:</strong> ${userData.notificationsEnabled ? '✅ Açık' : '❌ Kapalı'}<br>
                        <strong>Son Güncelleme:</strong> ${userData.lastTokenUpdate?.toDate?.() || 'Yok'}
                    `;
                    
                    if (token) {
                        document.getElementById('token').value = token;
                    }
                } else {
                    alert('Kullanıcı bulunamadı');
                }
            } catch (error) {
                alert('Hata: ' + error.message);
            }
        }

        window.sendNotification = async function() {
            const title = document.getElementById('title').value;
            const body = document.getElementById('body').value;
            const token = document.getElementById('token').value;

            if (!token) {
                alert('FCM Token giriniz');
                return;
            }

            // Firebase Cloud Messaging API v1 kullanarak bildirim gönder
            // NOT: Bu işlem için server key veya OAuth token gerekiyor
            // Bu yüzden Firebase Console'dan manuel göndermemiz gerekiyor
            
            document.getElementById('sendResult').style.display = 'block';
            document.getElementById('sendResult').innerHTML = `
                <strong>⚠️ Dikkat:</strong> Tarayıcıdan direkt bildirim gönderilemez.<br><br>
                <strong>Firebase Console'dan göndermek için:</strong><br>
                1. <a href="https://console.firebase.google.com/project/ecocell-5cf22/messaging" target="_blank">Firebase Console > Messaging</a> açın<br>
                2. "Send your first message" veya "New campaign" tıklayın<br>
                3. Başlık: <strong>${title}</strong><br>
                4. Mesaj: <strong>${body}</strong><br>
                5. "Send test message" tıklayın<br>
                6. FCM token yapıştırın:<br>
                <textarea readonly style="width:100%; height:80px; font-size:11px;">${token}</textarea><br>
                7. "Test" butonuna tıklayın<br><br>
                <strong>✅ Telefona bildirim gelecek!</strong>
            `;
        }
    </script>
</body>
</html>
